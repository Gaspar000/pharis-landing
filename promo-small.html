<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pharis — Promo pequeño (440×280)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Fira+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0b1120;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      padding: 40px;
      font-family: "Fira Sans", sans-serif;
    }

    /* Lienzo exacto para la Store: 440 × 280, sin scroll */
    #canvas {
      width: 440px;
      height: 280px;
      overflow: hidden;
      position: relative;
      background-color: #020617;
      background-image: radial-gradient(rgba(80, 143, 248, 0.10) 1px, transparent 1px);
      background-size: 22px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }
    /* Halo suave detrás del logo */
    #canvas::before {
      content: "";
      position: absolute;
      top: -36%;
      left: 50%;
      transform: translateX(-50%);
      width: 440px;
      height: 320px;
      background: radial-gradient(closest-side, rgba(80, 143, 248, 0.20), transparent 70%);
      pointer-events: none;
    }

    .brand { display: flex; align-items: center; gap: 12px; position: relative; }
    .brand svg { width: 36px; height: 30px; display: block; flex-shrink: 0; }
    .brand .name {
      font-family: "Manrope", sans-serif;
      font-weight: 400;
      font-size: 28px;
      letter-spacing: -0.5px;
      color: #ffffff;
      line-height: 1;
    }

    .tagline { position: relative; font-size: 13px; color: #94a3b8; }

    .pills { position: relative; display: flex; gap: 8px; margin-top: 4px; }
    .pill {
      font-size: 11px;
      color: #acc7ff;
      border: 1px solid rgba(80, 143, 248, 0.30);
      background: rgba(80, 143, 248, 0.06);
      border-radius: 999px;
      padding: 5px 11px;
      white-space: nowrap;
    }

    /* Controles fuera del lienzo (ignorados al capturar) */
    .cap-btn {
      font-family: "Fira Sans", sans-serif;
      font-size: 13px;
      font-weight: 600;
      background: #508ff8;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      cursor: pointer;
    }
    .cap-btn:hover { filter: brightness(1.08); }
    .hint { color: #64748b; font-size: 12px; text-align: center; max-width: 440px; }
    .hint code { color: #acc7ff; }
  </style>
</head>
<body>
  <div id="canvas">
    <div class="brand">
      <svg viewBox="0 0 21 17" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M0.018654 0C0.291685 0.0346468 1.06363 0.351087 1.35507 0.444175C2.00683 0.652386 2.66098 0.893337 3.30632 1.1157L7.44425 2.51569C8.06511 2.72709 8.66921 2.90399 9.28163 3.14897C9.27745 3.58039 9.21329 4.21939 9.18326 4.67222C9.11664 5.7132 9.04471 6.75378 8.96742 7.79399C8.90088 8.70041 8.87595 9.5429 8.82382 10.438L8.61194 13.5626C8.55515 14.428 8.39189 15.9957 8.40472 16.8065C7.86712 16.785 7.20704 16.8116 6.65379 16.8015C6.24697 16.7941 5.34462 16.7703 4.9748 16.8225C5.17644 16.3851 5.28948 15.8819 5.4424 15.4234C6.19564 13.1646 6.9358 10.8953 7.67625 8.63259C7.92098 7.93723 8.10071 7.37357 8.29986 6.66252C7.99596 6.82813 7.43703 6.98952 7.09294 7.10483L5.15151 7.75164C3.9828 8.13023 2.75982 8.58522 1.59136 8.9865C1.14081 9.14125 0.395517 9.31603 0.0199016 9.55254C0.00992916 8.76633 -0.022738 7.75843 0.0263541 6.98817C0.650986 6.90894 9.11771 4.70463 9.03973 4.77851C8.91731 4.62324 7.17078 4.26203 6.87252 4.18944L3.81818 3.43088C2.59209 3.13691 1.23158 2.74788 0.000468966 2.50575C0.0457848 1.81065 0.0160509 0.727473 0.018654 0Z" fill="#508FF8"/>
        <path d="M20.2672 0.0289993L20.3871 0.0302827C20.4597 0.124471 20.4258 2.21354 20.4249 2.49028C18.2297 3.0131 16.04 3.55894 13.8563 4.12766C13.5136 4.21342 11.545 4.59757 11.479 4.78639C11.655 4.86837 12.1966 4.9594 12.4251 5.01729L15.214 5.71423C16.9305 6.1261 18.725 6.6281 20.4239 7.02197C20.4254 7.37599 20.4564 9.20695 20.3958 9.44314C19.9444 9.43269 16.2385 8.06739 15.5812 7.84396L13.6376 7.19099C13.1168 7.01981 12.568 6.86388 12.079 6.62051C12.3181 7.16521 12.5208 7.916 12.7227 8.50749C12.9069 8.9939 13.0299 9.48999 13.1962 9.98319L14.8492 14.9667C14.9894 15.3789 15.2887 16.4491 15.4624 16.7646C14.3807 16.8598 13.1516 16.7846 12.0532 16.8182C12.0684 16.5415 11.9832 15.6921 11.9634 15.3661L11.7317 11.8073C11.6749 10.9925 11.6565 10.2069 11.6083 9.40552C11.4933 7.31429 11.3464 5.22496 11.1675 3.13823C12.1316 2.77479 13.1446 2.46883 14.1199 2.12588C16.1561 1.40981 18.2385 0.762741 20.2672 0.0289993Z" fill="#508FF8"/>
      </svg>
      <span class="name">Pharis</span>
    </div>
    <p class="tagline">Tu tutor de IA educativo para Chrome</p>
    <div class="pills">
      <span class="pill">Integración Moodle</span>
      <span class="pill">Sin instalación</span>
      <span class="pill">IA contextual</span>
    </div>
  </div>

  <button class="cap-btn" data-html2canvas-ignore="true" onclick="capture()">Descargar PNG (440×280)</button>
  <p class="hint" data-html2canvas-ignore="true">
    También puedes capturar a tamaño exacto: clic derecho sobre el lienzo → Inspeccionar →
    en el elemento <code>#canvas</code> usa “Capture node screenshot”.
  </p>

  <script>
    function capture() {
      const node = document.getElementById("canvas");
      html2canvas(node, {
        backgroundColor: "#020617",
        scale: 1,
        width: 440,
        height: 280,
        windowWidth: 440,
        windowHeight: 280,
      }).then((canvas) => {
        const a = document.createElement("a");
        a.download = "promo-small-440x280.png";
        a.href = canvas.toDataURL("image/png");
        a.click();
      });
    }
  </script>
</body>
</html>
